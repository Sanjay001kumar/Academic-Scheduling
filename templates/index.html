<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Academic Scheduling Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 50px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
            width: 100%;
        }

        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border: 2px dashed #667eea;
            border-radius: 10px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            color: #667eea;
            font-weight: 500;
        }

        .file-input-label:hover {
            background: #f0f2ff;
            border-color: #764ba2;
            color: #764ba2;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-wrapper input[type="file"]:valid ~ .file-input-label,
        .file-input-wrapper.has-file .file-input-label {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .file-name {
            margin-top: 10px;
            font-size: 13px;
            color: #666;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            .header h1 {
                font-size: 24px;
            }

            .file-input-label {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">📅</div>
            <h1>Academic Scheduling</h1>
            <p>Upload your Excel file to generate an intelligent timetable</p>
        </div>

        <form method="POST" enctype="multipart/form-data" id="uploadForm">
            <div class="form-group">
                <div class="file-input-wrapper">
                    <input type="file" name="file" id="fileInput" accept=".xlsx,.xls" required>
                    <label for="fileInput" class="file-input-label">
                        📁 Click to upload or drag and drop
                        <span style="font-size: 12px; margin-left: 8px;">(Excel files only)</span>
                    </label>
                    <div class="file-name" id="fileName"></div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Generate Timetable</button>
        </form>

        <div class="footer">
            Supported formats: .xlsx, .xls
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileWrapper = document.querySelector('.file-input-wrapper');
        const fileName = document.getElementById('fileName');

        fileInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                fileName.textContent = '✓ Selected: ' + this.files[0].name;
                fileName.classList.add('show');
                fileWrapper.classList.add('has-file');
            }
        });

        // Drag and drop functionality
        const label = document.querySelector('.file-input-label');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            label.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            label.addEventListener(eventName, () => {
                label.style.background = '#f0f2ff';
                label.style.borderColor = '#764ba2';
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            label.addEventListener(eventName, () => {
                label.style.background = '#f8f9ff';
                label.style.borderColor = '#667eea';
            });
        });

        label.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            fileInput.dispatchEvent(new Event('change', { bubbles: true }));
        });
    </script>
</body>
</html>
